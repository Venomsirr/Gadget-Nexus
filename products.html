<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Gadget Nexus</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="assets/images/logo.png" alt="Gadget Nexus" class="logo">
                <span class="brand-name">Gadget Nexus</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link active">Products</a>
                <a href="services.html" class="nav-link">Services</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section class="products-page">
        <div class="container">
            <h1 class="page-title fly-in">Our Premium Laptop Collection</h1>
            <p class="page-subtitle slide-up">Discover expertly refurbished laptops with warranty</p>

            <div class="products-filter">
                <input type="text" id="searchInput" placeholder="Search laptops..." class="search-input">
                <select id="priceFilter" class="filter-select">
                    <option value="all">All Prices</option>
                    <option value="2000-5000">R2,000 - R5,000</option>
                    <option value="5000-10000">R5,000 - R10,000</option>
                    <option value="10000+">R10,000+</option>
                </select>
            </div>

            <div class="products-grid-full" id="productsGrid">
                <!-- Laptops will be loaded dynamically -->
            </div>
        </div>
    </section>

    <div class="watermark">Created by <strong>Mahlatsi Mashifane</strong> — <a class="wm-phone" href="tel:0812668996">081 266 8996</a></div>

    <!-- Shopping Cart -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: R<span id="cartTotal">0</span></div>
            <button class="btn btn-primary" id="getQuoteBtn">
                <i class="fas fa-paper-plane"></i> Get Quote
            </button>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
